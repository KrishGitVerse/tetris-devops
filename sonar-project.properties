# =============================================================
# SonarQube Project Configuration
# =============================================================
# This file tells the SonarQube scanner:
# - What project this is
# - Where the source code is
# - Where the test results are
# - What to exclude from analysis
# =============================================================

# Project identification
sonar.projectKey=tetris-devops
sonar.projectName=Tetris DevOps
sonar.projectVersion=1.0.0

# Source code location (relative to this file's directory)
sonar.sources=app/src
sonar.tests=app/src/__tests__

# Language
sonar.language=js
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — don't scan these
sonar.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/coverage/**,\
  **/__mocks__/**,\
  **/public/**

# Test exclusions — don't count tests as source
sonar.test.exclusions=\
  **/node_modules/**,\
  **/build/**

# Coverage exclusions
sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/build/**,\
  **/__tests__/**,\
  **/__mocks__/**,\
  **/index.jsx,\
  **/setupTests.js

# Quality Gate
# Pipeline will FAIL if quality gate is not passed
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300