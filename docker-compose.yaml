# =============================================================
# docker-compose.yml — Production-like local setup
# =============================================================
# Run with: docker compose up
# Stop with: docker compose down
# =============================================================

version: '3.9'

services:
  # ===========================
  # Main Application
  # ===========================
  app:
    # Build from our Dockerfile
    build:
      context: .                        # Build context = project root
      dockerfile: docker/Dockerfile     # Which Dockerfile to use
      target: production                # Use the production stage
    
    # Container name (easier to reference than random names)
    container_name: tetris-app
    
    # Map host port 3001 → container port 3001
    # Format: "host_port:container_port"
    ports:
      - "3001:3001"
    
    # Environment variables injected at runtime
    # These OVERRIDE what's in the image
    environment:
      - NODE_ENV=production
      - PORT=3001
      - APP_NAME=tetris-devops
      - APP_VERSION=1.0.0
      - LOG_LEVEL=info
    
    # Mount a volume for logs
    # Format: "host_path:container_path"
    # This means logs written inside container appear on your host
    volumes:
      - ./logs:/app/logs
    
    # Health check configuration
    # Docker will show container as "healthy" or "unhealthy"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    
    # Restart policy
    # "unless-stopped" = restart on crash, but not if you manually stop it
    restart: unless-stopped
    
    # Resource limits (mirrors what we'll set in Kubernetes)
    deploy:
      resources:
        limits:
          cpus: '0.5'       # Max 50% of one CPU core
          memory: 256M      # Max 256MB RAM
        reservations:
          cpus: '0.1'       # Guaranteed 10% CPU
          memory: 128M      # Guaranteed 128MB RAM

# ===========================
# Networks
# ===========================
# Docker creates an isolated network for these containers
# Containers can reach each other by service name (e.g., "app")
networks:
  default:
    name: tetris-network
    driver: bridge

# ===========================
# Volumes
# ===========================
volumes:
  logs:
    driver: local